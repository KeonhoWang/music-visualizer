<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="beat-flash"></div>

    <div id="ui">
      <div id="top-bar">
        <div id="logo">🎵 Music Visualizer</div>
        <div id="top-actions">
          <button id="screenshot-btn">📸</button>
          <button id="timer-btn">⏱️ Timer</button>
          <button id="lyrics-btn">🔤 Lyrics</button>
          <div id="theme-dots">
            <div
              class="theme-dot active"
              style="background: #e94560"
              data-color="#e94560"
            ></div>
            <div
              class="theme-dot"
              style="background: #3b82f6"
              data-color="#3b82f6"
            ></div>
            <div
              class="theme-dot"
              style="background: #8b5cf6"
              data-color="#8b5cf6"
            ></div>
            <div
              class="theme-dot"
              style="background: #10b981"
              data-color="#10b981"
            ></div>
            <div
              class="theme-dot"
              style="background: #f59e0b"
              data-color="#f59e0b"
            ></div>
          </div>
        </div>
        <div id="song-info">
          <div id="song-name">No song loaded</div>
          <div id="song-artist">Pick a song to start</div>
        </div>
      </div>

      <div id="controls">
        <label id="upload-btn">
          📂 Add Songs
          <input type="file" id="file-input" accept="audio/*" multiple />
        </label>
        <button id="prev-btn">⏮️</button>
        <button id="play-btn" disabled>▶️</button>
        <button id="next-btn">⏭️</button>
        <div id="progress-container">
          <div id="progress-bar">
            <div id="progress-fill"></div>
          </div>
          <div id="time-display">0:00 / 0:00</div>
        </div>
        <div id="volume-container">
          🔊
          <input
            type="range"
            id="volume-slider"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />
        </div>
      </div>

      <div id="bottom-row">
        <div id="viz-modes">
          <button class="mode-btn active" data-mode="bars">Bars</button>
          <button class="mode-btn" data-mode="circle">Circle</button>
          <button class="mode-btn" data-mode="wave">Wave</button>
          <button class="mode-btn" data-mode="particles">Particles</button>
          <button class="mode-btn" data-mode="spiral">Spiral</button>
          <button class="mode-btn" data-mode="mirror">Mirror</button>
        </div>
        <button id="playlist-toggle">🎵 Playlist (0)</button>
      </div>
    </div>

    <!-- Playlist -->
    <div id="playlist-panel" class="hidden">
      <div id="playlist-header">
        <span>🎵 Playlist</span>
        <button id="playlist-close">✕</button>
      </div>
      <div id="playlist-items"></div>
    </div>

    <!-- Timer -->
    <div id="timer-modal" class="hidden">
      <div id="timer-box">
        <div id="timer-header">
          <span>⏱️ Sleep Timer</span>
          <button id="timer-close">✕</button>
        </div>
        <div id="timer-options">
          <button class="timer-opt" data-mins="5">5 min</button>
          <button class="timer-opt" data-mins="10">10 min</button>
          <button class="timer-opt" data-mins="15">15 min</button>
          <button class="timer-opt" data-mins="30">30 min</button>
          <button class="timer-opt" data-mins="60">1 hour</button>
        </div>
        <div id="timer-status"></div>
        <button id="timer-cancel" class="hidden">Cancel Timer</button>
      </div>
    </div>

    <!-- Lyrics -->
    <div id="lyrics-modal" class="hidden">
      <div id="lyrics-box">
        <div id="lyrics-header">
          <span>🔤 Lyrics</span>
          <button id="lyrics-close">✕</button>
        </div>
        <div id="lyrics-hint">
          <div class="hint-row">
            🎵 <strong>Auto sync</strong> — paste LRC lyrics from
            <a href="https://lrclib.net" target="_blank">lrclib.net</a>
          </div>
          <div class="hint-row">
            ⏱️ <strong>Manual</strong> — use <code>[00:12]</code> format
          </div>
          <div class="hint-row">
            🥁 <strong>Beat sync</strong> — paste plain lyrics, syncs to beat
          </div>
        </div>
        <textarea
          id="lyrics-input"
          placeholder="Paste LRC lyrics from lrclib.net for perfect sync!&#10;&#10;Or paste plain lyrics for beat sync.&#10;&#10;Example LRC format:&#10;[00:12.50] First line&#10;[00:15.30] Second line"
        ></textarea>
        <button id="lyrics-save">Save Lyrics</button>
      </div>
    </div>

    <script src="visualizer.js"></script>
  </body>
</html>
